name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradecore-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/tradecore-frontend
  PROXY_IMAGE: ghcr.io/${{ github.repository_owner }}/tradecore-claude-proxy

jobs:
  # ── Run tests ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: tradecore
          POSTGRES_USER: tradecore
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15

    env:
      DB_USER: tradecore
      DB_PASSWORD: testpass
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tradecore
      TRADING_MODE: paper
      CCXT_EXCHANGE: binance
      CLAUDE_ACCESS_TOKEN: dummy-token-for-ci
      CLAUDE_REFRESH_TOKEN: dummy-refresh-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Cache uv venv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies (with dev extras)
        working-directory: backend
        run: uv sync --extra dev

      - name: Run full test suite
        working-directory: backend
        run: uv run pytest -v --tb=short

  # ── Build & push Docker images → trigger Portainer ───────────────────────────
  deploy:
    name: Build, Push & Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build and push claude-proxy image
        uses: docker/build-push-action@v5
        with:
          context: docker/claude-proxy
          file: docker/claude-proxy/Dockerfile
          push: true
          tags: |
            ${{ env.PROXY_IMAGE }}:latest
            ${{ env.PROXY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=claude-proxy
          cache-to: type=gha,scope=claude-proxy,mode=max

      - name: Trigger Portainer redeploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer webhook responded: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "204" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "Webhook returned unexpected status $HTTP_STATUS"
            exit 1
          fi
