<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TradeCore — Algorithmic Trading Terminal</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { background: #0a0a0f; color: #dde2ed; }

::-webkit-scrollbar       { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
  background: #00d4ff; cursor: pointer; border: 2px solid #0a0a0f;
  box-shadow: 0 0 6px rgba(0,212,255,0.6);
}
input[type="range"]::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%;
  background: #00d4ff; cursor: pointer; border: 2px solid #0a0a0f;
}

input[type="date"],
input[type="number"],
input[type="text"],
select { color-scheme: dark; }

input:focus, select:focus { outline: none; }
button { font-family: inherit; }
button:active { opacity: 0.75; }

@keyframes tcPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/tc-globals.jsx"></script>
<script type="text/babel" src="components/tc-ui.jsx"></script>
<script type="text/babel" src="components/tc-dashboard.jsx"></script>
<script type="text/babel" src="components/tc-chart.jsx"></script>
<script type="text/babel" src="components/tc-strategy.jsx"></script>
<script type="text/babel" src="components/tc-backtest.jsx"></script>
<script type="text/babel" src="components/tc-signals.jsx"></script>
<script type="text/babel" src="components/tc-app.jsx"></script>
</body>
</html>
